server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- SPA fallback ----------
    # All routes that don't match a real file get served index.html,
    # so client-side routing (react-router-dom) works correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- API reverse proxy ----------
    # Forward /api/v1/* requests to the backend K8s Service.
    # The upstream name "aidd-backend" is resolved via K8s CoreDNS.
    location /api/v1/ {
        proxy_pass http://aidd-backend:8899;
        proxy_http_version 1.1;

        # SSE support (Server-Sent Events for streaming chat)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for LLM streaming responses
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ---------- Caching for static assets ----------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---------- Gzip compression ----------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
}
